# 本地开发配置：使用 H2 文件数据库（./data/ai_platform），无需 MySQL，数据在重启后保留
# 默认管理员：admin / admin123（首次启动自动创建）
server:
  port: 8081

app:
  admin:
    init-username: admin
    init-password: admin123
  skill:
    telemetry:
      token: dev-skill-telemetry-token
      gitlab:
        token: dev-skill-gitlab-token
  seed:
    demo-content: true
    pilot-skills: true
  scraper:
    ai-tools:
      max-items: 1  # 测试时只爬一条，正式爬取改为 0 表示不限

spring:
  datasource:
    url: jdbc:h2:file:./data/ai_platform;DB_CLOSE_DELAY=-1;MODE=MySQL;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
